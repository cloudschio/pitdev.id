<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chio — Web Developer Portfolio</title>
  <meta name="description" content="Portfolio personal premium untuk web developer, menampilkan project, skill, pengalaman, dan kontak." />
  <meta name="theme-color" content="#0b1220" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f6f3ee;
      --bg-soft: #fbfaf7;
      --card: rgba(255,255,255,.72);
      --card-strong: rgba(255,255,255,.88);
      --text: #171717;
      --muted: #5f6368;
      --line: rgba(23,23,23,.09);
      --primary: #0d9488;
      --primary-2: #0f766e;
      --accent: #d6fff6;
      --shadow: 0 10px 30px rgba(16,24,40,.08);
      --shadow-lg: 0 20px 60px rgba(16,24,40,.14);
      --radius: 24px;
      --radius-sm: 16px;
      --container: 1180px;
    }

    html[data-theme="dark"] {
      --bg: #0b1220;
      --bg-soft: #101827;
      --card: rgba(16,24,39,.72);
      --card-strong: rgba(17,24,39,.92);
      --text: #e5eefb;
      --muted: #94a3b8;
      --line: rgba(255,255,255,.08);
      --primary: #2dd4bf;
      --primary-2: #14b8a6;
      --accent: rgba(45,212,191,.12);
      --shadow: 0 10px 30px rgba(0,0,0,.25);
      --shadow-lg: 0 20px 60px rgba(0,0,0,.35);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(13,148,136,.10), transparent 32%),
        radial-gradient(circle at bottom right, rgba(59,130,246,.08), transparent 28%),
        var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }
    button { font: inherit; }

    .container {
      width: min(100% - 32px, var(--container));
      margin-inline: auto;
    }

    .section {
      padding: 92px 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--card);
      backdrop-filter: blur(10px);
      color: var(--muted);
      font-size: .92rem;
      margin-bottom: 18px;
    }

    .section-title {
      font-size: clamp(2rem, 4vw, 3.3rem);
      line-height: 1.05;
      letter-spacing: -.03em;
      margin-bottom: 14px;
    }

    .section-title .serif {
      font-family: 'Instrument Serif', serif;
      font-weight: 400;
      font-style: italic;
    }

    .section-text {
      color: var(--muted);
      max-width: 720px;
      font-size: 1.02rem;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(14px);
      background: color-mix(in srgb, var(--bg) 74%, transparent);
      border-bottom: 1px solid transparent;
      transition: .3s ease;
    }

    .site-header.scrolled {
      border-color: var(--line);
      box-shadow: var(--shadow);
    }

    .nav {
      min-height: 78px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      font-weight: 800;
      letter-spacing: -.03em;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      box-shadow: var(--shadow);
      font-size: 1rem;
      font-weight: 800;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 22px;
      list-style: none;
    }

    .nav-links a {
      color: var(--muted);
      font-weight: 500;
      transition: .25s ease;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--text);
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .menu-toggle,
    .theme-toggle {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--text);
      display: grid;
      place-items: center;
      cursor: pointer;
      backdrop-filter: blur(10px);
    }

    .menu-toggle { display: none; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 50px;
      padding: 0 20px;
      border-radius: 16px;
      border: 1px solid transparent;
      font-weight: 700;
      transition: .28s ease;
      cursor: pointer;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: white;
      box-shadow: var(--shadow);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .btn-secondary {
      background: var(--card);
      color: var(--text);
      border-color: var(--line);
      backdrop-filter: blur(10px);
    }

    .btn-secondary:hover {
      transform: translateY(-2px);
      border-color: color-mix(in srgb, var(--primary) 35%, var(--line));
    }

    .hero {
      padding: 54px 0 40px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 28px;
      align-items: stretch;
    }

    .hero-card,
    .glass-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .hero-card {
      padding: 42px;
      position: relative;
      overflow: hidden;
      isolation: isolate;
      min-height: 620px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .hero-card::before {
      content: "";
      position: absolute;
      inset: auto -80px -120px auto;
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, rgba(45,212,191,.24), transparent 65%);
      z-index: -1;
      pointer-events: none;
    }

    .hero-top {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      margin-bottom: 26px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 999px;
      background: var(--accent);
      color: var(--text);
      font-size: .92rem;
      border: 1px solid color-mix(in srgb, var(--primary) 25%, transparent);
    }

    .hero-title {
      font-size: clamp(3rem, 7vw, 6.5rem);
      line-height: .95;
      letter-spacing: -.06em;
      max-width: 10ch;
      margin-bottom: 18px;
    }

    .hero-title .serif {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-weight: 400;
    }

    .hero-desc {
      max-width: 60ch;
      font-size: 1.06rem;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 32px;
    }

    .hero-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .stat {
      padding: 18px;
      border-radius: 18px;
      background: var(--card-strong);
      border: 1px solid var(--line);
    }

    .stat h3 {
      font-size: 1.7rem;
      letter-spacing: -.03em;
      margin-bottom: 6px;
    }

    .stat p {
      color: var(--muted);
      font-size: .95rem;
    }

    .hero-side {
      display: grid;
      gap: 20px;
    }

    .profile-card {
      padding: 24px;
      min-height: 280px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .avatar-wrap {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 20px;
    }

    .avatar {
      width: 76px;
      height: 76px;
      border-radius: 22px;
      background: linear-gradient(135deg, var(--primary), #2563eb);
      display: grid;
      place-items: center;
      color: white;
      font-size: 1.6rem;
      font-weight: 800;
      box-shadow: var(--shadow);
    }

    .profile-meta h3 {
      font-size: 1.35rem;
      letter-spacing: -.03em;
    }

    .profile-meta p {
      color: var(--muted);
      margin-top: 4px;
    }

    .availability {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: .94rem;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 0 6px rgba(34,197,94,.12);
    }

    .mini-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .mini-box {
      padding: 18px;
      border-radius: 18px;
      background: var(--card-strong);
      border: 1px solid var(--line);
    }

    .mini-box span {
      display: block;
      color: var(--muted);
      font-size: .9rem;
      margin-bottom: 8px;
    }

    .mini-box strong {
      font-size: 1rem;
      line-height: 1.4;
    }

    .trusted {
      padding: 24px;
    }

    .trusted-list {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 18px;
    }

    .trusted-item {
      padding: 16px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: var(--card-strong);
      color: var(--muted);
      font-weight: 600;
      text-align: center;
    }

    .about-grid,
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
      align-items: start;
    }

    .content-card {
      padding: 32px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .bullet-list {
      list-style: none;
      display: grid;
      gap: 14px;
      margin-top: 20px;
    }

    .bullet-list li {
      display: flex;
      gap: 12px;
      color: var(--muted);
    }

    .bullet-list li::before {
      content: "✦";
      color: var(--primary);
      flex: 0 0 auto;
    }
